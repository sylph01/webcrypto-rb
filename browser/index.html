<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>webcrypto-rb scratchpad</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1.5rem; max-width: 60rem; }
    textarea { width: 100%; height: 16rem; font-family: ui-monospace, monospace; font-size: 13px; }
    pre { background: #f4f4f4; padding: 1rem; white-space: pre-wrap; word-break: break-word; }
    button { padding: .5rem 1rem; font-size: 14px; }
    .status { color: #666; }
  </style>
</head>
<body>
  <h1>webcrypto-rb scratchpad</h1>
  <p class="status" id="status">Booting ruby.wasm…</p>
  <textarea id="code" spellcheck="false"># Ruby runs here. Top-level `.await` works (evalAsync sets up the fiber).
key = WebCrypto.generate_key({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"])
iv  = WebCrypto::Util::JSArray.to_bytes(WebCrypto.getRandomValues(12))
ct  = key.encrypt("hello".b, iv: iv)
pt  = key.decrypt(ct, iv: iv)
"ciphertext: #{WebCrypto::Encoding.to_hex(ct)}\nround-trip: #{pt}"
</textarea>
  <p><button id="run" disabled>Run (Ctrl/Cmd+Enter)</button></p>
  <pre id="out"></pre>

  <script type="module">
    // ruby.wasm pinned to 2.7.1 (see CLAUDE.md — version-dependent quirks).
    import { DefaultRubyVM } from "https://cdn.jsdelivr.net/npm/@ruby/wasm-wasi@2.7.1/dist/browser/+esm";

    const statusEl = document.getElementById("status");
    const outEl = document.getElementById("out");
    const runBtn = document.getElementById("run");
    const codeEl = document.getElementById("code");

    async function boot() {
      const response = await fetch("https://cdn.jsdelivr.net/npm/@ruby/3.4-wasm-wasi@2.7.1/dist/ruby+stdlib.wasm");
      const module = await WebAssembly.compileStreaming(response);
      const { vm } = await DefaultRubyVM(module);
      // require "js" alone provides JS::Object#await; it works because the code
      // below runs under vm.evalAsync, which sets up the fiber.
      vm.eval(`require "js"`);
      const lib = await (await fetch("../webcrypto.rb")).text();
      vm.eval(lib);
      window.vm = vm; // drive from DevTools: await vm.evalAsync(`...`)
      statusEl.textContent = "Ready. window.vm is exposed for the DevTools console.";
      runBtn.disabled = false;
      return vm;
    }

    const vmPromise = boot().catch((e) => {
      statusEl.textContent = "Boot failed: " + e;
      throw e;
    });

    async function run() {
      const vm = await vmPromise;
      outEl.textContent = "Running…";
      try {
        const result = await vm.evalAsync(codeEl.value);
        outEl.textContent = result.toString();
      } catch (e) {
        outEl.textContent = "Error: " + e;
      }
    }

    runBtn.addEventListener("click", run);
    codeEl.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); run(); }
    });
  </script>
</body>
</html>
